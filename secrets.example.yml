# Copy this to secrets.yml and fill in real values
# secrets.yml is gitignored — this example is committed

# Google Workspace
GOOGLE_OAUTH_CLIENT_ID: "your-google-oauth-client-id"
GOOGLE_OAUTH_CLIENT_SECRET: "your-google-oauth-client-secret"

# Codeforces
CODEFORCES_EMAIL: "your-codeforces-email"
CODEFORCES_PASSWORD: "your-codeforces-password"
CODEFORCES_HANDLE: "your-codeforces-handle"
CODEFORCES_GROUP_ID: "your-codeforces-group-id"
CODEFORCES_CONTEST_ID: "your-contest-id"
CODEFORCES_CONTEST_NAME: "your-contest-name"
CODEFORCES_CONTEST_HOST: "your-contest-subdomain.contest.codeforces.com"

# YouTrack
YOUTRACK_API_BASE: "https://your-youtrack-instance/api"
YOUTRACK_PROJECT_CODE: "your-project-code"

# Burp Suite
BURPSUITE_DIR: "~/path/to/burpsuite"
BURPSUITE_LICENSE_LINE: "license info"
BURPSUITE_JAVA_AGENT_FLAGS: "java agent flags"
BURPSUITE_LICENSE_FRAME: "license frame"
BURPSUITE_SECURITY_NOTES: "security notes"

# Moodle
UNIVERSITY_NAME: "Your University"
MOODLE_HOST: "moodle.example.edu"
MOODLE_DOMAIN: "example.edu"
MOODLE_AUTHOR_NAME: "Your Name"
MOODLE_COURSE_IDS: |
  | Course Name 1 | 12345 |
  | Course Name 2 | 67890 |

# Twitter
TWITTER_HANDLE: "your-twitter-handle"
